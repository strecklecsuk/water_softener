name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create custom_components structure
        run: |
          mkdir -p /tmp/ws/custom_components/water_softener
          rsync -a --exclude='.git' --exclude='custom_components' \
            . /tmp/ws/custom_components/water_softener/

      - name: Clone HA core
        run: git clone --depth 1 https://github.com/home-assistant/core.git /tmp/hacore

      - name: Install hassfest dependencies
        run: |
          cd /tmp/hacore
          pip install --quiet voluptuous colorlog annotated-types
          pip install --quiet homeassistant || true

      - name: Run hassfest
        run: |
          cd /tmp/hacore
          python3 -m script.hassfest \
            --action validate \
            --integration-path /tmp/ws/custom_components/water_softener

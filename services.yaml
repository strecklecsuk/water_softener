complete_regeneration:
  name: Complete Regeneration
  description: >
    Manually confirms that a regeneration cycle has finished.
    Resets the remaining capacity to full and clears the manual_completion_pending flag.
    Only applicable in single-sensor mode (no output sensor configured).
  fields:
    entry_id:
      name: Entry ID
      description: The config entry ID of the water softener to reset.
      required: true
      example: "abc123def456"
      selector:
        text:
